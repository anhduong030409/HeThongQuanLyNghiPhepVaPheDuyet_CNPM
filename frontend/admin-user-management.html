<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LMS || Leave Management System</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/vendors/css/vendors.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/vendors/css/daterangepicker.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/css/theme.min.css" />
    <script src="assets/js/api.js"></script>
</head>

<body>
    <div id="navigation"></div>
    <div id="header"></div>

    <main class="nxl-container apps-container d-flex flex-column" style="min-height: calc(100vh - 80px);">
        <div class="nxl-content flex-grow-1">
            <div class="page-header">
                <div class="page-header-left d-flex align-items-center">
                    <div class="page-header-title">
                        <h5 class="m-b-10">Dashboard</h5>
                    </div>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item">Quản lý người dùng</li>
                    </ul>
                </div>
            </div>

            <div class="main-content">
                <div class="row">
                    <!-- Thanh công cụ -->
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div class="d-flex gap-2">
                                    <input type="text" class="form-control" id="searchInput"
                                        placeholder="Tìm kiếm người dùng..." oninput="filterUsers()">
                                    <select class="form-select" id="filterRole" onchange="filterUsers()">
                                        <option value="">Tất cả vai trò</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="btnAdd">
                                    <i class="feather-user-plus me-2"></i>Thêm người dùng
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Bảng người dùng -->
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5>Quản lý người dùng</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Mã</th>
                                                <th>Họ tên</th>
                                                <th>Email</th>
                                                <th>Phòng ban</th>
                                                <th>Quản lý trực tiếp</th>
                                                <th>Vai trò</th>
                                                <th>Trạng thái</th>
                                                <th class="text-center">Thao tác</th>
                                            </tr>
                                        </thead>
                                        <tbody id="user-tbody">
                                            <tr>
                                                <td colspan="8" class="text-center text-muted py-4">
                                                    <span class="spinner-border spinner-border-sm me-2"></span>Đang
                                                    tải...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer"></div>
    </main>



    <!-- Modal thêm/sửa người dùng -->
    <div class="modal fade" id="modalUser" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Thêm người dùng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="userId">

                    <div class="mb-3">
                        <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fullName" placeholder="Nhập họ tên">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="Nhập email">
                    </div>
                    <div class="mb-3" id="passwordField">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" placeholder="Mặc định: 123456">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" id="phone" placeholder="Nhập số điện thoại">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Vai trò <span class="text-danger">*</span></label>
                            <select class="form-select" id="roleId" onchange="onRoleChange()">
                                <!-- Load động từ DB -->
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phòng ban</label>
                            <select class="form-select" id="departmentId">
                                <option value="">-- Chọn phòng ban --</option>
                            </select>
                        </div>
                    </div>

                    <!-- Dropdown Manager — ẩn/hiện theo role -->
                    <div class="mb-3" id="managerField">
                        <label class="form-label">
                            Quản lý trực tiếp
                            <span class="text-muted fs-12">(người sẽ duyệt đơn nghỉ phép)</span>
                        </label>
                        <select class="form-select" id="managerId">
                            <option value="">-- Chọn quản lý --</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary" onclick="saveUser()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
        <div id="toastBox" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMsg"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="load-layout.js"></script>
    <script src="assets/vendors/js/vendors.min.js"></script>
    <script src="assets/vendors/js/daterangepicker.min.js"></script>
    <script src="assets/vendors/js/apexcharts.min.js"></script>
    <script src="assets/vendors/js/circle-progress.min.js"></script>
    <script src="assets/js/common-init.min.js"></script>
    <script src="assets/js/dashboard-init.min.js"></script>


    <script>
        const currentUser = checkRole(['admin']);
        if (!currentUser) throw new Error('Khong co quyen');

        let allUsers = [];

        // ================================================================
        // Helpers
        // ================================================================
        function showToast(message, type = 'success') {
            const box = document.getElementById('toastBox');
            const msg = document.getElementById('toastMsg');
            msg.innerText = message;
            box.className = `toast align-items-center border-0 text-white
                ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
            new bootstrap.Toast(box, { delay: 3000 }).show();
        }

        function renderRole(role) {
            const map = {
                admin: '<span class="badge bg-danger">Admin</span>',
                director: '<span class="badge bg-purple" style="background:#6f42c1">Giám đốc</span>',
                hr: '<span class="badge bg-info">HR</span>',
                manager: '<span class="badge bg-warning text-dark">Manager</span>',
                employee: '<span class="badge bg-secondary">Nhân viên</span>',
            };
            return map[role] ?? `<span class="badge bg-secondary">${role}</span>`;
        }

        // ================================================================
        // Load dữ liệu
        // ================================================================
        async function loadRoles() {
            const res = await callAPI('users/roles.php');
            if (!res || res.status !== 'success') return;

            // Dropdown filter
            const filter = document.getElementById('filterRole');
            filter.innerHTML = '<option value="">Tất cả vai trò</option>';
            res.data.forEach(r => {
                filter.innerHTML += `<option value="${r.name}">${r.display_name}</option>`;
            });

            // Dropdown trong modal
            const sel = document.getElementById('roleId');
            sel.innerHTML = '';
            res.data.forEach(r => {
                sel.innerHTML += `<option value="${r.id}" data-name="${r.name}">${r.display_name}</option>`;
            });
            sel.value = res.data.find(r => r.name === 'employee')?.id ?? '';
        }

        async function loadDepartments() {
            const res = await callAPI('departments/list.php');
            if (!res || res.status !== 'success') return;
            const sel = document.getElementById('departmentId');
            sel.innerHTML = '<option value="">-- Chọn phòng ban --</option>';
            res.data.forEach(d => {
                sel.innerHTML += `<option value="${d.id}">${d.name}</option>`;
            });
        }

        async function loadManagers() {
            const res = await callAPI('users/list.php');
            if (!res || res.status !== 'success') return;

            const sel = document.getElementById('managerId');
            sel.innerHTML = '<option value="">-- Chọn quản lý --</option>';

            // Chỉ hiện những người có thể là quản lý (director, hr, manager)
            const validRoles = ['director', 'hr', 'manager'];
            res.data
                .filter(u => validRoles.includes(u.role_name))
                .forEach(u => {
                    sel.innerHTML +=
                        `<option value="${u.id}">${u.full_name} (${u.role_name})</option>`;
                });
        }

        async function loadUsers() {
            const res = await callAPI('users/list.php');
            const tbody = document.getElementById('user-tbody');
            if (!res || res.status !== 'success') {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">
                    Lỗi tải dữ liệu</td></tr>`;
                return;
            }
            allUsers = res.data;
            renderTable(allUsers);
        }

        function renderTable(data) {
            const tbody = document.getElementById('user-tbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">
                    Không có người dùng nào</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>#${String(u.id).padStart(3, '0')}</td>
                    <td class="fw-semibold">${u.full_name}</td>
                    <td class="text-muted fs-13">${u.email}</td>
                    <td>${u.dept_name ?? '---'}</td>
                    <td class="fs-13">${u.manager_name ?? '<span class="text-muted">---</span>'}</td>
                    <td>${renderRole(u.role_name)}</td>
                    <td>${u.is_active == 1
                    ? '<span class="badge bg-success">Hoạt động</span>'
                    : '<span class="badge bg-secondary">Vô hiệu</span>'}</td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-sm btn-outline-primary"
                                onclick='openEdit(${JSON.stringify(u)})'>
                                <i class="feather-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger"
                                onclick="disableUser(${u.id})">
                                <i class="feather-slash"></i>
                            </button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        // ================================================================
        // Filter
        // ================================================================
        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const role = document.getElementById('filterRole').value;
            const filtered = allUsers.filter(u =>
                (!search || u.full_name.toLowerCase().includes(search) ||
                    u.email.toLowerCase().includes(search)) &&
                (!role || u.role_name === role)
            );
            renderTable(filtered);
        }

        // ================================================================
        // Ẩn/hiện field Manager theo role
        // ================================================================
        function onRoleChange() {
            const sel = document.getElementById('roleId');
            const roleName = sel.options[sel.selectedIndex]?.dataset.name ?? '';
            const field = document.getElementById('managerField');

            // Admin và Director không cần manager
            if (roleName === 'director') {
                field.style.display = 'none';
                document.getElementById('managerId').value = '';
            } else {
                field.style.display = 'block';
            }
        }

        // ================================================================
        // Modal thêm
        // ================================================================
        async function openAdd() {
            document.getElementById('modalTitle').innerText = 'Thêm người dùng';
            document.getElementById('userId').value = '';
            document.getElementById('fullName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('email').disabled = false;
            document.getElementById('password').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('passwordField').style.display = 'block';

            await loadDepartments();
            await loadManagers();
            document.getElementById('departmentId').value = '';
            document.getElementById('managerId').value = '';

            // Default role = employee → hiện manager field
            document.getElementById('managerField').style.display = 'block';

            new bootstrap.Modal(document.getElementById('modalUser')).show();
        }

        // ================================================================
        // Modal sửa
        // ================================================================
        async function openEdit(u) {
            document.getElementById('modalTitle').innerText = 'Sửa người dùng';
            document.getElementById('userId').value = u.id;
            document.getElementById('fullName').value = u.full_name;
            document.getElementById('email').value = u.email;
            document.getElementById('email').disabled = true;
            document.getElementById('phone').value = u.phone ?? '';
            document.getElementById('passwordField').style.display = 'none';

            await loadDepartments();
            await loadManagers();

            // Set role
            const roleMap = { admin: 1, director: 2, hr: 3, manager: 4, employee: 5 };
            document.getElementById('roleId').value = roleMap[u.role_name] ?? 5;
            onRoleChange();

            setTimeout(() => {
                document.getElementById('departmentId').value = u.department_id ?? '';
                document.getElementById('managerId').value = u.manager_id ?? '';
            }, 100);

            new bootstrap.Modal(document.getElementById('modalUser')).show();
        }

        // ================================================================
        // Lưu
        // ================================================================
        async function saveUser() {
            const id = document.getElementById('userId').value;
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const roleId = parseInt(document.getElementById('roleId').value);
            const deptId = document.getElementById('departmentId').value || null;
            const mgrId = document.getElementById('managerId').value || null;
            console.log('manager_id gửi đi:', document.getElementById('managerId').value);
            if (!fullName || !email) {
                showToast('Vui lòng nhập đầy đủ họ tên và email!', 'error');
                return;
            }

            let endpoint, body;
            if (id) {
                endpoint = 'users/update.php';
                body = {
                    id: parseInt(id),
                    full_name: fullName,
                    phone,
                    role_id: roleId,
                    department_id: deptId,
                    manager_id: mgrId ? parseInt(mgrId) : null,
                    is_active: 1
                };
            } else {
                endpoint = 'users/create.php';
                body = {
                    full_name: fullName,
                    email,
                    phone,
                    role_id: roleId,
                    department_id: deptId,
                    manager_id: mgrId ? parseInt(mgrId) : null,
                    password: document.getElementById('password').value || '123456'
                };
            }

            const res = await callAPI(endpoint, 'POST', body);
            if (res && res.status === 'success') {
                bootstrap.Modal.getInstance(document.getElementById('modalUser')).hide();
                showToast(id ? 'Cập nhật thành công!' : 'Thêm người dùng thành công!', 'success');
                loadUsers();
            } else {
                showToast(res?.message || 'Có lỗi xảy ra', 'error');
            }



        }

        // ================================================================
        // Vô hiệu hóa
        // ================================================================
        async function disableUser(id) {
            if (!confirm('Vô hiệu hóa người dùng này?')) return;
            const res = await callAPI('users/delete.php', 'POST', { id });
            if (res && res.status === 'success') {
                showToast('Đã vô hiệu hóa người dùng!', 'success');
                loadUsers();
            } else {
                showToast(res?.message || 'Có lỗi xảy ra', 'error');
            }
        }

        // ================================================================
        // Khởi chạy
        // ================================================================
        document.getElementById('btnAdd').addEventListener('click', openAdd);
        loadRoles();
        loadUsers();
    </script>
</body>

</html>
