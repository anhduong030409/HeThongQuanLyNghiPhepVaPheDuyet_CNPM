        <script>
            // 1. Phân quyền truy cập
            const currentUser = checkRole(['admin', 'hr', 'director', 'manager']);
            if (!currentUser) throw new Error('Không có quyền truy cập');

            // 2. Hàm tải danh sách nhân viên
            async function loadUsers() {
                const tbody = document.getElementById('users-tbody');
                
                try {
                    const res = await callAPI('users/list.php');
                    
                    if (!res || res.status !== 'success') {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Lỗi tải dữ liệu</td></tr>';
                        return;
                    }

                    if (res.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Không có nhân viên nào</td></tr>';
                        return;
                    }

                    let html = '';
                    let statTotal = res.data.length;
                    let statActive = 0;
                    let statInactive = 0;
                    let statNew = 0;

                    const now = new Date();
                    // check for "this month"
                    const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

                    res.data.forEach(u => {
                        const name = u.full_name || 'Chưa thiết lập';
                        const initial = name.split(' ').pop().substring(0, 2).toUpperCase();
                        
                        // Map màu sắc để phân biệt role
                        const roleColors = {
                            'admin': 'danger',
                            'director': 'primary',
                            'manager': 'warning',
                            'hr': 'info',
                            'employee': 'success'
                        };
                        const color = roleColors[u.role_name] || roleColors[u.role] || 'secondary';

                        // Xử lý Ngày gia nhập (created_at)
                        let joinDate = '---';
                        if (u.created_at) {
                            const d = new Date(u.created_at);
                            joinDate = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                            
                            // Tuyển mới: gia nhập trong THÁNG NÀY
                            const uMonthStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                            if (uMonthStr === currentMonthStr) {
                                statNew++;
                            }
                        }

                        // Xử lý Trạng thái
                        const isActive = parseInt(u.is_active) === 1;
                        if (isActive) statActive++;
                        else statInactive++;

                        const statusStr = isActive ? 'Hoạt động' : 'Tạm khóa';
                        const statusColor = isActive ? 'success' : 'danger';
                        
                        html += `
                        <tr>
                            <td class="px-4">
                                <div class="d-flex align-items-center">
                                    <div class="avatar-text avatar-md bg-soft-${color} text-${color} rounded-circle me-3 fw-bold">${initial}</div>
                                    <div>
                                        <span class="text-dark fw-bold d-block">${name}</span>
                                        <small class="text-muted">${u.email || ''}</small>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-soft-${color} text-${color}">${u.role_display || u.role_name}</span></td>
                            <td>${u.dept_name || (u.department_id ? 'Phòng ID: ' + u.department_id : '--')}</td>
                            <td>${joinDate}</td>
                            <td><span class="badge bg-soft-${statusColor} text-${statusColor}">${statusStr}</span></td>
                            <td class="text-end px-4">
                                <div class="hstack gap-2 justify-content-end">
                                    <button class="btn btn-sm btn-light-brand" onclick="alert('Tính năng đang phát triển!')"><i class="feather-edit-3"></i></button>
                                    <button class="btn btn-sm btn-light-danger" onclick="alert('Không thể xóa')"><i class="feather-trash-2"></i></button>
                                </div>
                            </td>
                        </tr>`;
                    });

                    tbody.innerHTML = html;

                    // Render Stats
                    document.getElementById('stat-total').innerText = statTotal < 10 ? '0' + statTotal : statTotal;
                    document.getElementById('stat-active').innerText = statActive < 10 ? '0' + statActive : statActive;
                    document.getElementById('stat-inactive').innerText = statInactive < 10 ? '0' + statInactive : statInactive;
                    document.getElementById('stat-new').innerText = statNew < 10 ? '0' + statNew : statNew;

                } catch (error) {
                    console.error("Lỗi:", error);
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Không thể kết nối API</td></tr>';
                }
            }

            // Gọi hàm render list
            loadUsers();
        </script>
