    <!-- Modal xem chi tiết -->
    <div class="modal fade" id="modalDetail" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết đơn nghỉ phép</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalDetailBody"></div>
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Đóng</button>
                    <button class="btn btn-danger d-none" id="btnCancel" onclick="cancelRequest()">
                        <i class="feather-x me-2"></i>Hủy đơn
                    </button>
                </div>

    <script>
        const currentUser = checkRole(['director', 'admin', 'hr', 'manager', 'employee']);
        if (!currentUser) throw new Error('Khong co quyen');

        let currentRequestId = null;
        let allHistory = []; // Cache toàn bộ dữ liệu
        let currentPage = 1;
        const rowsPerPage = 10;

        // ===== LOAD DANH SÁCH =====
        async function loadHistory() {
            renderSkeleton(); // Hiển thị skeleton loader
            const res = await callAPI(`leave/request.php?user_id=${currentUser.id}`);
            if (!res || res.status !== 'success') {
                document.querySelector('tbody').innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">Lỗi tải dữ liệu</td></tr>`;
                return;
            }

            allHistory = res.data; // Lưu vào cache
            filterHistory(); // Hiển thị với filter hiện tại
        }

        // ===== RENDER SKELETON =====
        function renderSkeleton() {
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';
            
            // Clear record count displays
            document.querySelectorAll('.record-count').forEach(el => el.innerText = 'Đang tải...');

            for (let i = 0; i < 5; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4"><div class="skeleton skeleton-text" style="width: 80px;"></div></td>
                        <td><div class="skeleton skeleton-text" style="width: 120px;"></div></td>
                        <td><div class="skeleton skeleton-text" style="width: 150px;"></div></td>
                        <td><div class="skeleton skeleton-text" style="width: 40px;"></div></td>
                        <td><div class="skeleton skeleton-text" style="width: 200px;"></div></td>
                        <td><div class="skeleton skeleton-text" style="width: 100px;"></div></td>
                        <td class="text-end pe-4"><div class="skeleton skeleton-text ms-auto" style="width: 32px; height: 32px; border-radius: 4px;"></div></td>
                    </tr>
                `;
            }
        }

        // ===== LỌC DỮ LIỆU =====
        function filterHistory() {
            currentPage = 1; // Reset về trang 1 khi lọc
            const keyword = (document.getElementById('filterKeyword')?.value || '').toLowerCase();
            const year = document.getElementById('filterYear')?.value || '';
            const status = document.getElementById('filterStatus')?.value || 'all';

            const filtered = allHistory.filter(r => {
                const matchKeyword = !keyword
                    || String(r.id).includes(keyword)
                    || (r.reason || '').toLowerCase().includes(keyword)
                    || (r.leave_type_name || '').toLowerCase().includes(keyword);

                const matchYear = !year
                    || new Date(r.start_date).getFullYear() == year;

                const matchStatus = status === 'all' || r.status === status;

                return matchKeyword && matchYear && matchStatus;
            });

            renderHistory(filtered);
        }

        // ===== ĐẶT LẠI FILTER =====
        function resetFilter() {
            document.getElementById('filterKeyword').value = '';
            document.getElementById('filterYear').value = '';
            document.getElementById('filterStatus').value = 'all';
            renderHistory(allHistory);
        }

        // ===== RENDER BẢNG =====
        function renderHistory(data) {
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';

            const total = data.length;
            const totalPages = Math.ceil(total / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pagedData = data.slice(start, end);

            const countText = total > 0 
                ? `Hiển thị ${start + 1}-${Math.min(end, total)} trên ${total} bản ghi`
                : 'Không có bản ghi nào';
            document.querySelectorAll('.record-count').forEach(el => el.innerText = countText);

            renderPagination(totalPages);

            if (pagedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Chưa có đơn nào</td></tr>`;
                return;
            }

            pagedData.forEach(r => {
                const statusBadge = renderStatus(r.status);
                const dateRange = r.start_date === r.end_date
                    ? formatDate(r.start_date)
                    : `${formatDate(r.start_date)} - ${formatDate(r.end_date)}`;

                tbody.innerHTML += `
        <tr>
            <td class="ps-4 fw-bold">#LR-${r.id}</td>
            <td>${r.leave_type_name ?? 'Nghỉ ghép'}</td>
            <td>${dateRange}</td>
            <td>${r.total_days}</td>
            <td class="text-truncate" style="max-width:200px">${r.reason}</td>
            <td>${statusBadge}</td>
            <td class="text-end pe-4">
                <button class="btn btn-sm btn-icon btn-light" onclick='showDetail(${JSON.stringify(r)})'>
                    <i class="feather-eye"></i>
                </button>
            </td>
        </tr>`;
            });

        }

        function renderStatus(status) {
            const map = {
                pending: '<span class="badge bg-soft-warning text-warning w-100">Chờ Manager duyệt</span>',
                pending_hr: '<span class="badge bg-soft-warning text-warning w-100">Chờ HR duyệt</span>',
                approved: '<span class="badge bg-soft-success text-success w-100">Đã phê duyệt</span>',
                rejected: '<span class="badge bg-soft-danger text-danger w-100">Bị từ chối</span>',
                cancelled: '<span class="badge bg-soft-secondary text-secondary w-100">Đã hủy</span>'
            };
            return map[status] ?? status;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        // ===== XEM CHI TIẾT =====
        function showDetail(r) {
            currentRequestId = r.id;
            const btnCancel = document.getElementById('btnCancel');

            // Chi hien nut huy neu don dang cho duyet
            btnCancel.classList.toggle('d-none', !(r.status === 'pending' || r.status === 'pending_hr'));

            document.getElementById('modalDetailBody').innerHTML = `
    <div class="row g-3">
        <div class="col-6">
            <div class="fs-12 text-muted">Mã đơn</div>
            <div class="fw-bold">#LR-${r.id}</div>
        </div>
        <div class="col-6">
            <div class="fs-12 text-muted">Trạng thái</div>
            <div>${renderStatus(r.status)}</div>
        </div>
        <div class="col-6">
            <div class="fs-12 text-muted">Loại nghỉ</div>
            <div>${r.leave_type_name}</div>
        </div>
        <div class="col-6">
            <div class="fs-12 text-muted">Số ngày</div>
            <div>${r.total_days} ngày</div>
        </div>
        <div class="col-6">
            <div class="fs-12 text-muted">Từ ngày</div>
            <div>${formatDate(r.start_date)}</div>
        </div>
        <div class="col-6">
            <div class="fs-12 text-muted">Đến ngày</div>
            <div>${formatDate(r.end_date)}</div>
        </div>
        <div class="col-12">
            <div class="fs-12 text-muted">Lý do</div>
            <div>${r.reason}</div>
        </div>
        ${r.status === 'rejected' ? `
        <div class="col-12">
            <div class="fs-12 text-muted">Lý do từ chối</div>
            <div class="text-danger">${r.cancel_reason ?? '---'}</div>
        </div>` : ''}
        <div class="col-12">
            <div class="fs-12 text-muted">Ngày gửi</div>
            <div>${r.submitted_at ? formatDate(r.submitted_at.split(' ')[0]) + ' ' + r.submitted_at.split(' ')[1].substring(0, 5) : '--'}</div>
        </div>

        <div class="col-12">
            <div class="fs-12 text-muted mb-1">Tệp đính kèm</div>
            ${r.document_url
                    ? `<a href="http://localhost:82/HeThongQuanLyNghiPhepVaPheDuyet_CNPM/backend/${r.document_url}"
                      target="_blank"
                      class="btn btn-sm btn-outline-primary">
                        <i class="feather-paperclip me-1"></i>Xem file đính kèm
                   </a>`
                    : '<span class="text-muted fs-13">Không có tệp đính kèm</span>'}
        </div>

        ${r.is_combined && r.items && r.items.length > 0 ? `
        <div class="col-12">
            <div class="fs-12 text-muted mb-1">Chi tiết loại phép</div>
            <table class="table table-sm table-bordered mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="fs-12">Loại phép</th>
                        <th class="fs-12 text-end">Số ngày</th>
                    </tr>
                </thead>
                <tbody>
                    ${r.items.map(i => `
                    <tr>
                        <td class="fs-13">${i.leave_type_name}</td>
                        <td class="fs-13 text-end">${i.days_used} ngày</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>` : ''}

    </div>`;

            new bootstrap.Modal(document.getElementById('modalDetail')).show();
        }

        // ===== HỦY ĐƠN =====
        async function cancelRequest() {
            if (!confirm('Bạn chắc chắn muốn hủy đơn này?')) return;

            const res = await callAPI(`leave/request.php?action=cancel`, 'POST', { id: currentRequestId });

            if (res && res.status === 'success') {
                bootstrap.Modal.getInstance(document.getElementById('modalDetail')).hide();
                loadHistory();
            } else {
                alert(res?.message || 'Lỗi khi hủy đơn');
            }
        }

        // ===== EXPORT EXCEL =====
        function exportExcel() {
            if (!allHistory.length) { alert('Không có dữ liệu để xuất!'); return; }
            
            const user = getUser();
            const headers = [
                ['LỊCH SỬ NGHỈ PHÉP - ' + (user?.full_name || 'Nhân viên')],
                ['Ngày xuất: ' + new Date().toLocaleString()],
                [],
                ['Mã đơn', 'Loại nghỉ', 'Số ngày', 'Từ ngày', 'Đến ngày', 'Trạng thái', 'Lý do', 'Ngày gửi']
            ];

            const rows = allHistory.map(r => [
                `LR-${r.id.toString().padStart(4, '0')}`,
                r.leave_type_name || 'Nghỉ ghép',
                r.total_days,
                formatDate(r.start_date),
                formatDate(r.end_date),
                r.status === 'approved' ? 'Chấp thuận' : 
                r.status === 'rejected' ? 'Bị từ chối' : 
                r.status === 'cancelled' ? 'Đã hủy' : 'Đang chờ',
                r.reason || '--',
                r.submitted_at ? `${formatDate(r.submitted_at.split(' ')[0])} ${r.submitted_at.split(' ')[1].substring(0, 5)}` : '--'
            ]);

            const worksheet = XLSX.utils.aoa_to_sheet([...headers, ...rows]);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "LichSuNghiPhep");

            // Căn chỉnh cột
            const colWidths = [12, 15, 10, 15, 15, 15, 35, 15];
            worksheet['!cols'] = colWidths.map(w => ({ wch: w }));

            XLSX.writeFile(workbook, `Lich-Su-Nghi-Phep-${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        // ===== RENDER PHÂN TRANG =====
        function renderPagination(totalPages) {
            const paginationUl = document.querySelector('.pagination');
            if (!paginationUl) return;
            paginationUl.innerHTML = '';

            if (totalPages <= 1) return;

            // Nút Previous
            paginationUl.innerHTML += `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link border-0 rounded-pill px-3 text-dark" href="javascript:void(0)" onclick="changePage(${currentPage - 1})">
                        <i class="feather-chevron-left"></i>
                    </a>
                </li>
            `;

            // Các con số
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    paginationUl.innerHTML += `
                        <li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link border-0 rounded-pill px-3 ${i === currentPage ? '' : 'text-dark'}" href="javascript:void(0)" onclick="changePage(${i})">${i}</a>
                        </li>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    paginationUl.innerHTML += `<li class="page-item disabled"><span class="page-link border-0">...</span></li>`;
                }
            }

            // Nút Next
            paginationUl.innerHTML += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link border-0 rounded-pill px-3 text-dark" href="javascript:void(0)" onclick="changePage(${currentPage + 1})">
                        <i class="feather-chevron-right"></i>
                    </a>
                </li>
            `;
        }

        function changePage(page) {
            currentPage = page;
            const keyword = (document.getElementById('filterKeyword')?.value || '').toLowerCase();
            const year = document.getElementById('filterYear')?.value || '';
            const status = document.getElementById('filterStatus')?.value || 'all';

            const filtered = allHistory.filter(r => {
                const matchKeyword = !keyword || String(r.id).includes(keyword) || (r.reason || '').toLowerCase().includes(keyword) || (r.leave_type_name || '').toLowerCase().includes(keyword);
                const matchYear = !year || new Date(r.start_date).getFullYear() == year;
                const matchStatus = status === 'all' || r.status === status;
                return matchKeyword && matchYear && matchStatus;
            });
            renderHistory(filtered);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== KHỞI CHẠY =====
