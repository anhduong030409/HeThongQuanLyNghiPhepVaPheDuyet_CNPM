    <!-- Modal Đổi Mật Khẩu -->
    <div class="modal fade" id="modalChangePassword" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="feather-lock me-2"></i>Đổi mật khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formChangePassword">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Mật khẩu cũ</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="feather-key text-muted"></i></span>
                                <input type="password" id="oldPassword" class="form-control border-start-0 ps-0" placeholder="Nhập mật khẩu cũ" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Mật khẩu mới</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="feather-lock text-muted"></i></span>
                                <input type="password" id="newPassword" class="form-control border-start-0 ps-0" placeholder="Nhập mật khẩu mới" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Xác nhận mật khẩu mới</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="feather-check-circle text-muted"></i></span>
                                <input type="password" id="confirmPassword" class="form-control border-start-0 ps-0" placeholder="Nhập lại mật khẩu mới" required>
                            </div>
                        </div>
                        <div class="alert alert-danger d-none" id="errorChangePassword"></div>
                        <div class="alert alert-success d-none" id="successChangePassword"></div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-warning px-4" onclick="submitChangePassword()" id="btnSubmitChangePassword">
                        <i class="feather-save me-1"></i>Xác nhận đổi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Xác thực xem có đang đăng nhập hay ko
            const currentUser = checkLogin();
            if (!currentUser) return;

            // Gọi hàm lấy chi tiết dữ liệu
            await loadUserProfile();
            
            // Xử lý sự kiện khi modal đóng (reset form)
            const modalEl = document.getElementById('modalChangePassword');
            modalEl.addEventListener('hidden.bs.modal', function() {
                document.getElementById('formChangePassword').reset();
                document.getElementById('errorChangePassword').classList.add('d-none');
                document.getElementById('successChangePassword').classList.add('d-none');
            });
        });

        async function submitChangePassword() {
            const old_password     = document.getElementById('oldPassword').value;
            const new_password     = document.getElementById('newPassword').value;
            const confirm_password = document.getElementById('confirmPassword').value;
            const errorEl          = document.getElementById('errorChangePassword');
            const successEl        = document.getElementById('successChangePassword');
            const btnSubmit        = document.getElementById('btnSubmitChangePassword');

            errorEl.classList.add('d-none');
            successEl.classList.add('d-none');

            // Validate front-end
            if (!old_password || !new_password || !confirm_password) {
                errorEl.innerText = "Vui lòng nhập đầy đủ thông tin!";
                errorEl.classList.remove('d-none');
                return;
            }

            if (new_password !== confirm_password) {
                errorEl.innerText = "Mật khẩu xác nhận không khớp!";
                errorEl.classList.remove('d-none');
                return;
            }

            if (new_password.length < 6) {
                errorEl.innerText = "Mật khẩu mới phải có ít nhất 6 ký tự!";
                errorEl.classList.remove('d-none');
                return;
            }

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang xử lý...';

                const response = await callAPI('users/change-password.php', 'POST', {
                    old_password,
                    new_password,
                    confirm_password
                });

                if (response && response.status === "success") {
                    successEl.innerText = "Đổi mật khẩu thành công!";
                    successEl.classList.remove('d-none');
                    document.getElementById('formChangePassword').reset();
                    
                    // Đóng modal sau 2 giây
                    setTimeout(() => {
                        bootstrap.Modal.getInstance(document.getElementById('modalChangePassword')).hide();
                    }, 1500);
                } else {
                    errorEl.innerText = response.message || "Có lỗi xảy ra, vui lòng thử lại!";
                    errorEl.classList.remove('d-none');
                }
            } catch (error) {
                console.error("Lỗi:", error);
                errorEl.innerText = "Không thể kết nối đến máy chủ!";
                errorEl.classList.remove('d-none');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="feather-save me-1"></i>Xác nhận đổi';
            }
        }

        async function loadUserProfile() {
            try {
                // Dùng hàm callAPI chung với đường dẫn users/info.php
                // Hàm sửa soạn Token AuthBearer tự động gởi kèm
                const result = await callAPI('users/info.php');

                if (result && result.status === "success" && result.data) {
                    const user = result.data;

                    // 1. Cột trái
                    document.getElementById('profileFullName').innerText = user.full_name || 'Chưa cập nhật';
                    document.getElementById('profileRoleName').innerText = user.role_display || user.role_name;

                    // Tạo avatar text từ chữ cái đầu của tên
                    if (user.full_name) {
                        document.getElementById('profileAvatarText').innerText = user.full_name.charAt(0).toUpperCase();
                    }

                    // Trạng thái
                    const statusHtml = user.is_active == 1
                        ? '<span class="badge bg-success-subtle text-success">Đang hoạt động</span>'
                        : '<span class="badge bg-danger-subtle text-danger">Đã khóa</span>';
                    document.getElementById('profileStatusBadge').innerHTML = statusHtml;

                    // 2. Cột phải
                    document.getElementById('profileId').innerText = `#${user.id}`;
                    document.getElementById('profileEmail').innerText = user.email || 'Chưa cập nhật';
                    document.getElementById('profilePhone').innerText = user.phone || 'Chưa cập nhật';

                    let genderText = 'Chưa cập nhật';
                    if (user.gender === 'male') genderText = 'Nam';
                    if (user.gender === 'female') genderText = 'Nữ';
                    if (user.gender === 'other') genderText = 'Khác';
                    document.getElementById('profileGender').innerText = genderText;

                    document.getElementById('profileDept').innerText = user.dept_name || 'Chưa phân phòng';
                    document.getElementById('profileManager').innerText = user.manager_name || 'Không có';

                    // Format lại ngày tháng
                    if (user.created_at) {
                        const dateObj = new Date(user.created_at);
                        document.getElementById('profileCreatedAt').innerText = dateObj.toLocaleDateString('vi-VN');
                    } else {
                        document.getElementById('profileCreatedAt').innerText = 'Chưa rõ';
                    }

                } else {
                    document.getElementById('profileFullName').innerText = 'Không tìm thấy thông tin';
                    alert(result?.message || 'Không tìm thấy thông tin tài khoản!');
                }
            } catch (error) {
                console.error('Lỗi khi fetch dữ liệu:', error);
                alert('Lỗi kết nối máy chủ!');
            }
        }
    </script>
