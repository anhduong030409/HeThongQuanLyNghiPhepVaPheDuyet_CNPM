    <!-- Modal từ chối -->
    <div class="modal fade" id="modalReject" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Từ chối đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Lý do từ chối <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="rejectComment" rows="3"
                        placeholder="Nhập lý do từ chối..."></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-warning text-white" onclick="confirmReject()">Xác nhận từ chối</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
        <div id="toastBox" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMsg"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script>
        const API = '../backend/api/leave/approve.php';
        const token = localStorage.getItem('token');
        let rejectingId = null;

        function showToast(message, type = 'success') {
            const toastBox = document.getElementById('toastBox');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = message;
            toastBox.className = `toast align-items-center border-0 text-white 
        ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
            new bootstrap.Toast(toastBox, { delay: 3000 }).show();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '---';
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        // ===== LOAD DANH SÁCH =====
        async function loadRequests() {
            const res = await fetch(`${API}?status=pending`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const json = await res.json();
            if (json.status !== 'success') return;

            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';

            if (json.data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
            Không có đơn nào cần duyệt</td></tr>`;
                return;
            }

            json.data.forEach((r, i) => {
                const dateRange = r.start_date === r.end_date
                    ? formatDate(r.start_date)
                    : `${formatDate(r.start_date)} - ${formatDate(r.end_date)}`;

                tbody.innerHTML += `
        <tr>
            <td class="text-center">${i + 1}</td>
            <td class="fw-bold text-dark">${r.full_name}</td>
            <td>${r.email}</td>
            <td><span class="badge bg-soft-info text-info">${r.total_days} ngày</span></td>
            <td>${dateRange}</td>
            <td>${r.reason}</td>
            <td class="text-center">
                <div class="hstack gap-2 justify-content-center">
                    <button class="btn btn-sm btn-success"
                        onclick="approve(${r.id})">Duyệt</button>
                    <button class="btn btn-sm btn-warning text-white"
                        onclick="openReject(${r.id})">Từ chối</button>
                </div>
            </td>
        </tr>`;
            });
        }

        // ===== DUYỆT =====
        async function approve(id) {
            if (!confirm('Duyệt đơn này?')) return;
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ request_id: id, decision: 'approved', comment: '' })
            });
            const json = await res.json();
            if (json.status === 'success') {
                showToast('Đã duyệt đơn!', 'success');
                loadRequests();
            } else {
                showToast(json.message, 'error');
            }
        }

        // ===== TỪ CHỐI =====
        function openReject(id) {
            rejectingId = id;
            document.getElementById('rejectComment').value = '';
            new bootstrap.Modal(document.getElementById('modalReject')).show();
        }

        async function confirmReject() {
            const comment = document.getElementById('rejectComment').value.trim();
            if (!comment) { alert('Vui lòng nhập lý do từ chối!'); return; }

            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ request_id: rejectingId, decision: 'rejected', comment })
            });
            const json = await res.json();
            if (json.status === 'success') {
                bootstrap.Modal.getInstance(document.getElementById('modalReject')).hide();
                showToast('Đã từ chối đơn!', 'success');
                loadRequests();
            } else {
                showToast(json.message, 'error');
            }
        }

        // Khoi chay
        loadRequests();
    </script>
