<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản Lý Nghỉ Phép</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/vendors/css/vendors.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/theme.min.css">
    <script src="assets/js/api.js"></script>
</head>

<body>
    <div id="navigation"></div>
    <div id="header"></div>

    <main class="nxl-container apps-container">
        <div class="nxl-content">
            <div class="page-header">
                <div class="page-header-left d-flex align-items-center">
                    <div class="page-header-title">
                        <h5 class="m-b-5">Danh sách nghỉ phép chờ duyệt</h5>
                    </div>
                </div>
                <div class="page-header-right ms-auto">
                    <div class="d-flex align-items-center gap-2">
                        <select class="form-select form-select-sm" id="statusFilter" onchange="loadRequests()"
                            style="width:180px">
                            <!-- Options sẽ được render theo role trong JS -->
                        </select>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card stretch stretch-full">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead class="thead-light">
                                            <tr>
                                                <th class="text-center" style="width:50px">STT</th>
                                                <th>Tên nhân viên</th>
                                                <th>Email</th>
                                                <th>Loại phép</th>
                                                <th>Thời gian</th>
                                                <th>Ngày nghỉ</th>
                                                <th>Lý do</th>
                                                <th>Trạng thái</th>
                                                <th class="text-center">Thao tác</th>
                                            </tr>
                                        </thead>
                                        <tbody id="request-tbody">
                                            <tr>
                                                <td colspan="9" class="text-center text-muted py-4">
                                                    <span class="spinner-border spinner-border-sm me-2"></span>
                                                    Đang tải...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal từ chối -->
    <div class="modal fade" id="modalReject" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Từ chối đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Lý do từ chối <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="rejectComment" rows="3"
                        placeholder="Nhập lý do từ chối..."></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-warning text-white" onclick="confirmReject()">
                        Xác nhận từ chối
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal chi tiết đơn ghép -->
    <div class="modal fade" id="modalDetail" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết phân bổ phép</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalDetailBody"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
        <div id="toastBox" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMsg"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="load-layout.js"></script>
    <script src="assets/vendors/js/vendors.min.js"></script>
    <script src="assets/js/common-init.min.js"></script>

    <script>
        const currentUser = checkRole(['admin', 'director', 'hr', 'manager']);
        if (!currentUser) throw new Error('Khong co quyen');

        const isHrLevel = ['hr', 'admin', 'director'].includes(currentUser.role);
        let rejectingId = null;

        // ================================================================
        // Render filter options theo role
        // ================================================================
        function initFilter() {
            const filter = document.getElementById('statusFilter');

            // Status mặc định: manager thấy 'pending', HR thấy 'pending_hr'
            const defaultStatus = isHrLevel ? 'pending_hr' : 'pending';

            const options = isHrLevel
                ? [
                    { value: 'pending_hr', label: 'Chờ HR duyệt' },
                    { value: 'approved', label: 'Đã duyệt' },
                    { value: 'rejected', label: 'Đã từ chối' },
                    { value: 'pending', label: 'Chờ Manager duyệt' },
                    { value: '', label: 'Tất cả' },
                ]
                : [
                    { value: 'pending', label: 'Chờ duyệt' },
                    { value: 'approved', label: 'Đã duyệt' },
                    { value: 'rejected', label: 'Đã từ chối' },
                    { value: '', label: 'Tất cả' },
                ];

            filter.innerHTML = options.map(o =>
                `<option value="${o.value}" ${o.value === defaultStatus ? 'selected' : ''}>
                    ${o.label}
                </option>`
            ).join('');
        }

        // ================================================================
        // Helpers
        // ================================================================
        function showToast(message, type = 'success') {
            const box = document.getElementById('toastBox');
            const msg = document.getElementById('toastMsg');
            msg.innerText = message;
            box.className = `toast align-items-center border-0 text-white
                ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
            new bootstrap.Toast(box, { delay: 3000 }).show();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '---';
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function statusBadge(status) {
            const map = {
                pending: 'bg-soft-warning text-warning',
                pending_hr: 'bg-soft-info text-info',
                approved: 'bg-soft-success text-success',
                rejected: 'bg-soft-danger text-danger',
                cancelled: 'bg-soft-secondary text-secondary',
            };
            const label = {
                pending: 'Chờ Manager duyệt',
                pending_hr: 'Chờ HR duyệt',
                approved: 'Đã duyệt',
                rejected: 'Từ chối',
                cancelled: 'Đã hủy',
            };
            return `<span class="badge ${map[status] || ''}">${label[status] || status}</span>`;
        }

        // ================================================================
        // Kiểm tra có được duyệt đơn này không
        // ================================================================
        function canApprove(r) {
            if (isHrLevel) return r.status === 'pending_hr';
            return r.status === 'pending';
        }

        // ================================================================
        // Render cột Loại phép
        // ================================================================
        function renderLeaveTypeCell(r) {
            if (r.is_combined && r.items && r.items.length > 0) {
                const summary = r.items
                    .map(i => `${i.leave_type_name} (${i.days_used}n)`)
                    .join(' + ');
                return `
                    <div class="fs-13">${summary}</div>
                    <a href="javascript:void(0)" class="fs-11 text-primary"
                        onclick="showDetail(${r.id}, ${JSON.stringify(r.items).replace(/"/g, '&quot;')})">
                        Xem chi tiết
                    </a>`;
            }
            return `<span class="badge bg-soft-info text-info">${r.leave_type_name || '---'}</span>`;
        }

        // ================================================================
        // Modal chi tiết đơn ghép
        // ================================================================
        function showDetail(requestId, items) {
            const rows = items.map((item, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${item.leave_type_name}</td>
                    <td><strong>${item.days_used}</strong> ngày</td>
                </tr>`).join('');

            document.getElementById('modalDetailBody').innerHTML = `
                <table class="table table-sm">
                    <thead class="table-light">
                        <tr><th>#</th><th>Loại phép</th><th>Số ngày</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                    <tfoot>
                        <tr class="fw-bold">
                            <td colspan="2">Tổng</td>
                            <td>${items.reduce((s, i) => s + parseFloat(i.days_used), 0)} ngày</td>
                        </tr>
                    </tfoot>
                </table>`;
            new bootstrap.Modal(document.getElementById('modalDetail')).show();
        }

        // ================================================================
        // Load danh sách đơn — gọi approve.php (có GET handler)
        // ================================================================
        async function loadRequests() {
            const status = document.getElementById('statusFilter').value;
            const tbody = document.getElementById('request-tbody');

            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
                <span class="spinner-border spinner-border-sm me-2"></span>Đang tải...</td></tr>`;

            const endpoint = status
                ? `leave/approve.php?status=${status}`
                : 'leave/approve.php';

            const json = await callAPI(endpoint);

            if (!json || json.status !== 'success') {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">
                    Lỗi tải dữ liệu</td></tr>`;
                return;
            }

            if (json.data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
                    Không có đơn nào</td></tr>`;
                return;
            }

            tbody.innerHTML = json.data.map((r, i) => {
                const dateRange = r.start_date === r.end_date
                    ? formatDate(r.start_date)
                    : `${formatDate(r.start_date)} – ${formatDate(r.end_date)}`;

                const actionBtns = canApprove(r) ? `
                    <div class="hstack gap-2 justify-content-center">
                        <button class="btn btn-sm btn-success" onclick="approve(${r.id})">
                            <i class="feather-check me-1"></i>Duyệt
                        </button>
                        <button class="btn btn-sm btn-warning text-white"
                            onclick="openReject(${r.id})">
                            <i class="feather-x me-1"></i>Từ chối
                        </button>
                    </div>` : '---';

                return `
                <tr>
                    <td class="text-center">${i + 1}</td>
                    <td class="fw-bold text-dark">${r.full_name || '---'}</td>
                    <td class="text-muted fs-13">${r.email || ''}</td>
                    <td>${renderLeaveTypeCell(r)}</td>
                    <td><span class="badge bg-soft-info text-info">${r.total_days} ngày</span></td>
                    <td class="fs-13">${dateRange}</td>
                    <td class="fs-13">${r.reason || '---'}</td>
                    <td>${statusBadge(r.status)}</td>
                    <td class="text-center">${actionBtns}</td>
                </tr>`;
            }).join('');
        }

        // ================================================================
        // Duyệt đơn
        // ================================================================
        async function approve(id) {
            if (!confirm('Xác nhận duyệt đơn nghỉ phép này?')) return;
            const res = await callAPI('leave/approve.php', 'POST', {
                request_id: id,
                decision: 'approved',
                comment: ''
            });
            if (res?.status === 'success') {
                showToast(res.message || 'Đã duyệt đơn!', 'success');
                loadRequests();
            } else {
                showToast(res?.message || 'Có lỗi xảy ra', 'error');
            }
        }

        // ================================================================
        // Từ chối đơn
        // ================================================================
        function openReject(id) {
            rejectingId = id;
            document.getElementById('rejectComment').value = '';
            new bootstrap.Modal(document.getElementById('modalReject')).show();
        }

        async function confirmReject() {
            const comment = document.getElementById('rejectComment').value.trim();
            if (!comment) {
                alert('Vui lòng nhập lý do từ chối!');
                return;
            }
            const res = await callAPI('leave/approve.php', 'POST', {
                request_id: rejectingId,
                decision: 'rejected',
                comment: comment
            });
            if (res?.status === 'success') {
                bootstrap.Modal.getInstance(document.getElementById('modalReject')).hide();
                showToast('Đã từ chối đơn!', 'success');
                loadRequests();
            } else {
                showToast(res?.message || 'Có lỗi xảy ra', 'error');
            }
        }

        // ================================================================
        // Khởi chạy
        // ================================================================
        initFilter();
        loadRequests();
    </script>
</body>

</html>
