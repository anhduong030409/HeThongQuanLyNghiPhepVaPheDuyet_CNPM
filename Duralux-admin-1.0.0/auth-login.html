<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Nghỉ phép</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary-color: #3483ff; /* Màu xanh đồng bộ với nút Gửi đơn của bạn */
            --bg-light: #f4f7fa;
        }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .avatar-text {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(52, 131, 255, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
        }

        .form-control {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(52, 131, 255, 0.1);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.7rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #2866cc;
            transform: translateY(-1px);
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
        }

        .form-control {
            border-left: none;
        }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="card-body">
        <div class="text-center">
            <div class="avatar-text">
                <i data-feather="lock"></i>
            </div>
            <h4 class="fw-bold text-dark">DURALUX</h4> <p class="text-muted small">Hệ thống quản lý nghỉ phép nhân viên</p>
        </div>

        <form action="dashboard.html" class="mt-4">
            <div class="mb-3">
                <label class="form-label fw-semibold fs-13">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-feather="user" style="width: 16px;"></i></span>
                    <input type="text" class="form-control" placeholder="Mã nhân viên..." required>
                </div>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between">
                    <label class="form-label fw-semibold fs-13">Mật khẩu</label>
                    <a href="#" class="text-primary text-decoration-none small">Quên mật khẩu?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i data-feather="key" style="width: 16px;"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small text-muted" for="remember">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                ĐĂNG NHẬP <i data-feather="arrow-right" class="ms-2" style="width: 16px;"></i>
            </button>
        </form>

        <div class="text-center border-top pt-3">
            <p class="text-muted small mb-0">Hỗ trợ: <a href="#" class="text-dark fw-bold text-decoration-none">IT Helpdesk</a></p>
        </div>
    </div>
</div>

<script>
    // Kích hoạt icon Feather
    feather.replace();
</script>

</body>
</html>
